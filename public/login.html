<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Сервер</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="glass-panel login-panel">
            <div class="panel-header text-center">
                <img src="logo.png" alt="Logo" class="logo-image" style="height: 48px; width: 48px; object-fit: contain; margin: 0 auto 10px;">
                <h1>С возвращением</h1>
                <p>Войдите для доступа к Менеджеру Лицензий.</p>
            </div>

            <form id="loginForm" class="generate-form">
                <div class="input-group">
                    <label for="username">Имя пользователя (Логин)</label>
                    <input type="text" id="username" name="username" placeholder="Введите логин" required
                        autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required
                        autocomplete="current-password">
                </div>

                <div class="form-actions" style="margin-top: 2rem;">
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span class="btn-text">Войти</span>
                        <div class="loader hidden" id="btnLoader"></div>
                    </button>
                </div>
            </form>

            <div class="error-toast hidden" id="errorToast" style="margin-top: 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                    </path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span id="errorMessage">Произошла ошибка.</span>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>

stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:latest

  # Запускается только при пуше в ветку main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  before_script:
    # Устанавливаем SSH-клиент и настраиваем ключ
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # Отключаем проверку fingerprint (или можно добавить known_hosts)
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config

  script:
    - |
      ssh -p 22 ${SERVER_USER}@${SERVER_HOST} "
        set -e
        echo '=== Переходим в директорию проекта ==='
        cd ${DEPLOY_PATH}

        echo '=== Получаем обновления ==='
        git pull origin main

        echo '=== Пересобираем контейнер приложения (БД не трогается) ==='
        docker compose up -d --build app

        echo '=== Статус контейнеров ==='
        docker compose ps
      "

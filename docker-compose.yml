version: '3.8'

services:
  app:
    build: .
    container_name: license_server_app
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-licenses_db}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  db:
    image: postgres:15
    container_name: license_server_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-licenses_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-licenses_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:15
    container_name: license_server_backup
    restart: always
    volumes:
      - ./backups:/backups
    environment:
      - PGHOST=db
      - PGDATABASE=${POSTGRES_DB:-licenses_db}
      - PGUSER=${POSTGRES_USER:-postgres}
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
    # Выполняем дамп напрямую без зависимости от внешнего bash-скрипта
    entrypoint: >
      sh -c "
      echo 'Backup scheduler started (daily at midnight)';
      while true; do
        FILENAME=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql;
        echo \"Starting backup to $$FILENAME\";
        pg_dump -h db -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-licenses_db} > $$FILENAME;
        echo \"Backup completed\";
        # Удаляем бекапы старше 7 дней
        find /backups -type f -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: